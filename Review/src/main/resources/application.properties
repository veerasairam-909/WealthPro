# ==========================================
# WealthPro - Review Service Configuration
# ==========================================

# Application Info
spring.application.name=review
server.port=8089

# ==========================================
# MySQL Database Configuration
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/wealthpro_review?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Navahith@2478194
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ==========================================
# Validation Error Messages
# ==========================================
spring.messages.basename=error
spring.messages.encoding=UTF-8

# ==========================================
# Jackson (JSON) Configuration
# ==========================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
spring.boot.admin.client.enabled=true
spring.boot.admin.client.instance.prefer-ip=true
spring.boot.admin.client.url=http://localhost:8083
