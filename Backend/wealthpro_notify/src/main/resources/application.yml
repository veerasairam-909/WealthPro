spring:
  datasource:
    url: jdbc:mysql://localhost:3306/notification
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  application:
    name: notifications

  boot:
    admin:
      client:
        enabled: true
        instance:
          prefer-ip: true
        url: http://localhost:8085

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
