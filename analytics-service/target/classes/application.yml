# =============================================================
# WealthPro Analytics-Service Configuration
# =============================================================

server:
  port: 8082

spring:
  application:
    name: analytics-service
  datasource:
    url: jdbc:mysql://localhost:3306/analytics_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple
  boot:
    admin:
      client:
        url: http://localhost:9090
        instance:
          prefer-ip: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  file:
    name: logs/analytics.log
  level:
    com.wealthpro.analytics: DEBUG
