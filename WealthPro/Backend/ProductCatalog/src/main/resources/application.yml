server:
  port: 8084

spring:
  application:
    name: productcatalog-service

  datasource:
    url: jdbc:mysql://localhost:3306/productcatalog
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  boot:
    admin:
      client:
        enabled: true
        url: http://localhost:8083
        instance:
          prefer-ip: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always