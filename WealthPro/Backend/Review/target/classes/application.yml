server:
  port: 8089

spring:
  application:
    name: review-service

  datasource:
    url: jdbc:mysql://localhost:3306/wealthpro_review?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  messages:
    basename: error
    encoding: UTF-8

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

  boot:
    admin:
      client:
        enabled: true
        url: http://localhost:8083
        instance:
          prefer-ip: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always