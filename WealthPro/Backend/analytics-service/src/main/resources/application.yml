server:
  port: 8082

spring:
  application:
    name: analytics-service
  datasource:
    url: jdbc:mysql://localhost:3306/analytics_db
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  cache:
    type: simple
  boot:
    admin:
      client:
        enabled: true
        url: http://localhost:8083
        instance:
          prefer-ip: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  file:
    name: logs/analytics.log
  level:
    com.wealthpro.analytics: DEBUG
